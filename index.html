<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>予約フォーム</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 16px;
      background: #f5f5f5;
      color: #333;
    }
    .center {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }
    .error {
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      margin-top: 20px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .error h2 {
      color: #c62828;
      font-size: 1.1rem;
      margin-top: 0;
    }
    .spinner {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid #ddd;
      border-top-color: #06c755;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div id="loading" class="center">
  <div class="spinner"></div>
  <p>読み込み中...</p>
</div>

<div id="error" class="error" style="display:none;">
  <h2>URLが正しくありません</h2>
  <p>お手数ですが、LINEのメニューから再度お試しください。</p>
  <p id="errorDetail" style="font-size:0.85rem; color:#888;"></p>
</div>

<script>
(function () {
  // ▼ フォーム種別 → ファイル名のマッピング
  // 新しいフォームを追加するときは、ここに1行追加するだけでOK
  const FORM_MAP = {
    'followup': 'followup_exam_reservation.html',
    // 'consultation': 'consultation.html',
    // 'vaccine': 'vaccine.html',
  };

  // ▼ クエリパラメータから form を取得(liff.state 経由にも対応)
  function getFormParam() {
    const params = new URLSearchParams(location.search);

    // 通常の ?form=xxx を確認
    let form = params.get('form');
    if (form) return form;

    // LINEログイン経由のときは liff.state の中に元のパラメータが入っている
    const state = params.get('liff.state');
    if (state) {
      const m = decodeURIComponent(state).match(/[?&]form=([^&]+)/);
      if (m) return m[1];
    }

    return null;
  }

  // ▼ エラー表示
  function showError(message) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = '';
    if (message) {
      document.getElementById('errorDetail').textContent = message;
    }
  }

  // ▼ メイン処理
  const form = getFormParam();

  if (!form) {
    showError('form パラメータが指定されていません');
    return;
  }

  const targetFile = FORM_MAP[form];
  if (!targetFile) {
    showError('不明なフォーム種別: ' + form);
    return;
  }

  // ▼ 元のクエリパラメータを引き継いでリダイレクト
  // location.replace を使うことで、戻るボタンでindex.htmlに戻ってこない
  location.replace('./' + targetFile + location.search);
})();
</script>

</body>
</html>
