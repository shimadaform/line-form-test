<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>予約フォーム</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 16px;
      background: #f5f5f5;
      color: #333;
    }
    .center {
      text-align: center;
      padding: 60px 20px;
      color: #888;
    }
    .error {
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      margin-top: 20px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }
    .error h2 {
      color: #c62828;
      font-size: 1.1rem;
      margin-top: 0;
    }
    .spinner {
      display: inline-block;
      width: 32px;
      height: 32px;
      border: 3px solid #ddd;
      border-top-color: #06c755;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .debug {
      background: #fff8e1;
      border: 1px solid #ffd54f;
      border-radius: 8px;
      padding: 12px;
      margin-top: 16px;
      font-size: 0.8rem;
      word-break: break-all;
    }
    .debug h3 {
      margin: 0 0 8px 0;
      font-size: 0.9rem;
      color: #f57c00;
    }
    .debug-item {
      margin-bottom: 8px;
      padding: 8px;
      background: #fff;
      border-radius: 4px;
    }
    .debug-label {
      font-weight: bold;
      color: #555;
      font-size: 0.75rem;
      display: block;
      margin-bottom: 4px;
    }
    .debug-value {
      font-family: "Courier New", monospace;
      color: #333;
      font-size: 0.75rem;
    }
    .copy-btn {
      background: #06c755;
      color: #fff;
      border: none;
      padding: 8px 16px;
      border-radius: 4px;
      font-size: 0.85rem;
      margin-top: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="loading" class="center">
  <div class="spinner"></div>
  <p>読み込み中...</p>
</div>

<div id="error" class="error" style="display:none;">
  <h2>URLが正しくありません</h2>
  <p>お手数ですが、LINEのメニューから再度お試しください。</p>
  <p id="errorDetail" style="font-size:0.85rem; color:#888;"></p>

  <div class="debug">
    <h3>🔍 デバッグ情報</h3>
    <div class="debug-item">
      <span class="debug-label">現在のURL</span>
      <span class="debug-value" id="debugFullUrl"></span>
    </div>
    <div class="debug-item">
      <span class="debug-label">パラメータ一覧</span>
      <span class="debug-value" id="debugParams"></span>
    </div>
    <div class="debug-item">
      <span class="debug-label">liff.state</span>
      <span class="debug-value" id="debugLiffState"></span>
    </div>
    <button class="copy-btn" id="copyBtn">この情報をコピー</button>
  </div>
</div>

<script>
(function () {
  // ▼ フォーム種別 → ファイル名のマッピング
  const FORM_MAP = {
    'followup': 'followup_exam_reservation.html',
    // 'consultation': 'consultation.html',
    // 'vaccine': 'vaccine.html',
  };

  // ▼ 既知のフォームHTMLファイル名(パス指定で来た場合の照合用)
  const KNOWN_FORM_FILES = Object.values(FORM_MAP);

  // ▼ 振り分け先を決定する処理(複数のパターンに対応)
  function resolveTarget() {
    const params = new URLSearchParams(location.search);

    // ▼ パターン1: 通常の ?form=xxx
    const form = params.get('form');
    if (form && FORM_MAP[form]) {
      return {
        file: FORM_MAP[form],
        query: location.search,
      };
    }

    // ▼ パターン2: liff.state にパラメータが入っている場合
    const liffState = params.get('liff.state');
    if (liffState) {
      const decoded = decodeURIComponent(liffState);

      // パターン2a: liff.state="?form=xxx" 形式
      const formMatch = decoded.match(/[?&]form=([^&]+)/);
      if (formMatch && FORM_MAP[formMatch[1]]) {
        return {
          file: FORM_MAP[formMatch[1]],
          query: location.search,
        };
      }

      // パターン2b: liff.state="/xxx.html?yyy" 形式(パス指定)
      // 例: "/followup_exam_reservation.html?liff.hback=2"
      const pathMatch = decoded.match(/^\/?([^?#]+\.html)(\?.*)?$/);
      if (pathMatch) {
        const filename = pathMatch[1];
        if (KNOWN_FORM_FILES.includes(filename)) {
          return {
            file: filename,
            query: location.search,
          };
        }
      }
    }

    return null;
  }

  function showDebugInfo() {
    document.getElementById('debugFullUrl').textContent = location.href;

    const params = new URLSearchParams(location.search);
    const paramsList = [];
    for (const [key, value] of params.entries()) {
      const displayValue = value.length > 50 ? value.substring(0, 50) + '...' : value;
      paramsList.push(key + ' = ' + displayValue);
    }
    document.getElementById('debugParams').textContent =
      paramsList.length > 0 ? paramsList.join('\n') : '(なし)';

    const liffState = params.get('liff.state');
    document.getElementById('debugLiffState').textContent =
      liffState ? decodeURIComponent(liffState) : '(なし)';

    document.getElementById('copyBtn').addEventListener('click', () => {
      const text = '【デバッグ情報】\n' +
        'URL: ' + location.href + '\n' +
        'パラメータ:\n' + paramsList.join('\n') + '\n' +
        'liff.state: ' + (liffState ? decodeURIComponent(liffState) : '(なし)');

      if (navigator.clipboard) {
        navigator.clipboard.writeText(text)
          .then(() => alert('コピーしました'))
          .catch(() => fallbackCopy(text));
      } else {
        fallbackCopy(text);
      }
    });
  }

  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('コピーしました');
  }

  function showError(message) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = '';
    if (message) document.getElementById('errorDetail').textContent = message;
    showDebugInfo();
  }

  // ▼ メイン処理
  const target = resolveTarget();
  if (!target) {
    showError('フォーム種別を特定できませんでした');
    return;
  }

  location.replace('./' + target.file + target.query);
})();
</script>

</body>
</html>
